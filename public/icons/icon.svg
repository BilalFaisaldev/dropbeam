<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <linearGradient id="logo-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Icon Background -->
  <rect x="32" y="32" width="448" height="448" rx="100" fill="url(#bg-grad)" />
  
  <!-- Outer Radio Wave -->
  <path d="M 120 280 A 136 136 0 0 1 392 280" fill="none" stroke="url(#logo-grad)" stroke-width="28" stroke-linecap="round" opacity="0.4" />
  
  <!-- Middle Radio Wave -->
  <path d="M 170 280 A 86 86 0 0 1 342 280" fill="none" stroke="url(#logo-grad)" stroke-width="28" stroke-linecap="round" opacity="0.7" />
  
  <!-- Inner Radio Wave / Dot -->
  <circle cx="256" cy="280" r="32" fill="url(#logo-grad)" filter="url(#glow)" />
  
  <!-- Horizontal Beam lines representing speed/sharing -->
  <path d="M 190 380 L 322 380" fill="none" stroke="#ffffff" stroke-width="20" stroke-linecap="round" opacity="0.9" />
  <path d="M 220 420 L 292 420" fill="none" stroke="#ffffff" stroke-width="20" stroke-linecap="round" opacity="0.6" />
</svg>
